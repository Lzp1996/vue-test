name: Deploy Vue to GitHub Pages

# 什么时候触发
on:
  push:
    branches: [master]   # push 到 master 分支时触发
  workflow_dispatch:   # 允许在 GitHub 网页手动点「Run workflow」

# 权限：部署 Pages 需要
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个部署任务同时跑，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # 在 GitHub 提供的 Linux 虚拟机上跑
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建
      - name: Build
        run: npm run build

      # 5. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 6. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4