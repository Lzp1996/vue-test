name: Auto Merge

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    if: |
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.type == 'Bot' &&
        contains(github.event.comment.body, '状态: APPROVE') &&
        contains(github.event.comment.body, '能否自动部署: yes'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Auto merge when CI green and Claude APPROVE
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber;

            if (context.eventName === 'issue_comment') {
              prNumber = context.issue.number;
            } else {
              const pulls = context.payload.workflow_run.pull_requests || [];
              if (pulls.length === 0) {
                core.info('No PR linked to workflow run, skip.');
                return;
              }
              prNumber = pulls[0].number;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.state !== 'open') {
              core.info('PR is not open, skip.');
              return;
            }

            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.head.sha,
            });

            const ciPassed = checks.check_runs.some(
              (check) => check.name === 'build' && check.conclusion === 'success'
            );

            if (!ciPassed) {
              core.info('CI build check not passed yet, skip.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const approved = comments.some(
              (comment) =>
                comment.body.includes('状态: APPROVE') &&
                comment.body.includes('能否自动部署: yes')
            );

            if (!approved) {
              core.info('No Claude APPROVE comment found, skip.');
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'merge',
            });

            core.info(`PR #${prNumber} merged automatically.`);
