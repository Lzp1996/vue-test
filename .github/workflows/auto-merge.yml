name: Auto Merge

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write

jobs:
  auto-merge:
    if: |
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.type == 'Bot' &&
        contains(github.event.comment.body, '## 审查结论') &&
        contains(github.event.comment.body, '- 状态: APPROVE') &&
        contains(github.event.comment.body, '能否自动部署: yes'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Auto merge when CI green and Claude APPROVE
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function isApprovedComment(body) {
              if (!body || /状态:\s*BLOCK\b/.test(body)) return false;
              return (
                /状态:\s*APPROVE\b/.test(body) &&
                /能否自动部署:\s*yes\b/.test(body)
              );
            }

            async function resolvePrNumber() {
              if (context.eventName === 'issue_comment') {
                return context.issue.number;
              }

              const pulls = context.payload.workflow_run.pull_requests || [];
              if (pulls.length > 0) {
                return pulls[0].number;
              }

              const headSha = context.payload.workflow_run.head_sha;
              const { data: prs } =
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: headSha,
                });

              const openPr = prs.find((pr) => pr.state === 'open');
              if (openPr) {
                return openPr.number;
              }

              core.info(`No open PR linked to commit ${headSha}, skip.`);
              return null;
            }

            const prNumber = await resolvePrNumber();
            if (!prNumber) return;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.state !== 'open') {
              core.info('PR is not open, skip.');
              return;
            }

            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.head.sha,
            });

            const ciPassed = checks.check_runs.some(
              (check) => check.name === 'build' && check.conclusion === 'success'
            );

            if (!ciPassed) {
              core.info('CI build check not passed yet, skip.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });

            const approved = comments.some((comment) =>
              isApprovedComment(comment.body)
            );

            if (!approved) {
              core.info('No Claude APPROVE comment found, skip.');
              return;
            }

            const { data: mergeResult } = await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'merge',
            });

            if (!mergeResult.merged) {
              core.info(`PR #${prNumber} merge returned merged=false, skip deploy.`);
              return;
            }

            core.info(`PR #${prNumber} merged automatically.`);

            // GITHUB_TOKEN 触发的 merge 不会触发 push → deploy.yml，需手动 dispatch
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'deploy.yml',
              ref: 'master',
            });

            core.info('Deploy workflow dispatched.');
