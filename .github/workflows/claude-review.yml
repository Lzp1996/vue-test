# PR 打开或更新时，Claude Headless 自动审查并给出结论
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  ANTHROPIC_BASE_URL: "https://www.hotaitool.net"
  ANTHROPIC_AUTH_TOKEN: ${{ secrets.HOTAI_API_KEY }}
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check HOTAI_API_KEY
        env:
          HOTAI_API_KEY: ${{ secrets.HOTAI_API_KEY }}
        run: |
          if [ -z "$HOTAI_API_KEY" ]; then
            echo "::error::未配置 HOTAI_API_KEY。请到仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.HOTAI_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Vue 3 + Vite 静态站，GitHub Pages base 为 /vue-test/。
            请遵循仓库根目录 CLAUDE.md 的审查标准。
            PR diff 已写入 pr.diff，不要运行 gh pr diff，不要读其它文件。

            严格 2 步完成：
            1. Read pr.diff（只读一次）
            2. 运行一次 gh pr comment ${{ github.event.pull_request.number }} --body "..." 发评论

            评论 body 格式：

            ## 审查结论
            - 状态: APPROVE 或 BLOCK
            - 风险等级: low / medium / high
            - 能否自动部署: yes / no
            - 理由: （一句话）

            ## 问题列表
            （无则写「无」）

            ## 修改建议
            （无则写「无」）

            发完评论立即结束。
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6
            --allowedTools "Read,Bash(gh pr comment:*)"
