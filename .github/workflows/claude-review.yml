# PR 打开或更新时，Claude Headless 自动审查并给出结论
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  ANTHROPIC_BASE_URL: "https://www.hotaitool.net"
  ANTHROPIC_AUTH_TOKEN: ${{ secrets.HOTAI_API_KEY }}
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check HOTAI_API_KEY
        env:
          HOTAI_API_KEY: ${{ secrets.HOTAI_API_KEY }}
        run: |
          if [ -z "$HOTAI_API_KEY" ]; then
            echo "::error::未配置 HOTAI_API_KEY。请到仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Build review prompt
        id: build
        run: |
          {
            echo 'text<<EOF'
            echo "REPO: ${{ github.repository }}"
            echo "PR NUMBER: ${{ github.event.pull_request.number }}"
            echo ""
            echo "Vue 3 + Vite 静态站，GitHub Pages base 为 /vue-test/。"
            echo "遵循 CLAUDE.md 审查标准。不要调用任何工具，只输出 JSON。"
            echo ""
            echo "--- PR DIFF ---"
            cat pr.diff
            echo "--- END DIFF ---"
            echo ""
            echo "请根据 diff 输出 JSON，body 字段为 PR 评论 markdown，格式："
            echo "## 审查结论"
            echo "- 状态: APPROVE 或 BLOCK"
            echo "- 风险等级: low / medium / high"
            echo "- 能否自动部署: yes 或 no"
            echo "- 理由: （一句话）"
            echo ""
            echo "## 问题列表"
            echo "（无则写「无」）"
            echo ""
            echo "## 修改建议"
            echo "（无则写「无」）"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # prompt 参数 = Headless 自动化模式（非 @claude 交互）
      - name: Claude PR Review (headless)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.HOTAI_API_KEY }}
          prompt: ${{ steps.build.outputs.text }}
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6
            --json-schema '{"type":"object","properties":{"body":{"type":"string","description":"PR review comment in markdown"}},"required":["body"],"additionalProperties":false}'

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          STRUCTURED: ${{ steps.claude.outputs.structured_output }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;

            if (!process.env.STRUCTURED) {
              core.setFailed('Claude 未返回 structured_output，请检查 HotAI 或 max-turns。');
              return;
            }

            const data = JSON.parse(process.env.STRUCTURED);
            if (!data.body) {
              core.setFailed('Claude 输出缺少 body 字段。');
              return;
            }

            fs.writeFileSync('comment.md', data.body);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: data.body,
            });

            core.info('PR 审查评论已发布。');
