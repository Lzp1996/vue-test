# PR 打开或更新时，Claude API 自动审查并给出结论（不经过 claude-code-action Agent SDK）
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      ANTHROPIC_BASE_URL: https://www.hotaitool.net
      ANTHROPIC_MODEL: claude-sonnet-4-6
      CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

    steps:
      - name: Check HOTAI_API_KEY
        env:
          HOTAI_API_KEY: ${{ secrets.HOTAI_API_KEY }}
        run: |
          if [ -z "$HOTAI_API_KEY" ]; then
            echo "::error::未配置 HOTAI_API_KEY。请到仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi

      - name: Claude review and post comment
        uses: actions/github-script@v8
        env:
          HOTAI_API_KEY: ${{ secrets.HOTAI_API_KEY }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // 用 GitHub API 取 diff，无需 checkout（gh pr diff 依赖 .git）
            const diff = await github.request(
              'GET /repos/{owner}/{repo}/pulls/{pull_number}',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                headers: { accept: 'application/vnd.github.diff' },
              }
            ).then((res) => String(res.data));

            const prompt = [
              `REPO: ${context.repo.owner}/${context.repo.repo}`,
              `PR NUMBER: ${prNumber}`,
              '',
              '你是 PR 代码审查 Bot。Vue 3 + Vite 静态站，GitHub Pages base 为 /vue-test/。',
              '只输出 JSON，不要 markdown，不要代码块，不要其它文字。',
              '',
              '审查标准：',
              '- status=APPROVE, risk_level=low, auto_deploy=yes：仅改 src/ 下 UI、文案、样式，无密钥',
              '- status=BLOCK, auto_deploy=no：改 workflow 且明显错误、泄露密钥、vite base 非 /vue-test/、会导致 build 失败',
              '- auto_deploy=no：package.json 大版本依赖、改 deploy/Pages 配置、删重要文件',
              '- auto_deploy=yes 仅当：APPROVE + low + 改动仅在 src/',
              '',
              'JSON 字段：status, risk_level, auto_deploy, reason, issues, suggestions',
              'status 只能是 APPROVE 或 BLOCK；risk_level 只能是 low/medium/high；auto_deploy 只能是 yes 或 no。',
              '',
              '--- PR DIFF ---',
              diff,
              '--- END DIFF ---',
            ].join('\n');

            const response = await fetch(
              `${process.env.ANTHROPIC_BASE_URL}/v1/messages`,
              {
                method: 'POST',
                headers: {
                  'content-type': 'application/json',
                  'x-api-key': process.env.HOTAI_API_KEY,
                  'anthropic-version': '2023-06-01',
                },
                body: JSON.stringify({
                  model: process.env.ANTHROPIC_MODEL,
                  max_tokens: 1024,
                  messages: [{ role: 'user', content: prompt }],
                }),
              }
            );

            const raw = await response.text();
            if (!response.ok) {
              core.setFailed(`Claude API 错误 (${response.status}): ${raw.slice(0, 500)}`);
              return;
            }

            let apiData;
            try {
              apiData = JSON.parse(raw);
            } catch {
              core.setFailed(`Claude API 返回非 JSON: ${raw.slice(0, 500)}`);
              return;
            }

            const answer = (apiData.content || [])
              .filter((part) => part.type === 'text')
              .map((part) => part.text)
              .join('\n')
              .trim();

            core.info(`Claude 原始回复:\n${answer.slice(0, 300)}`);

            function parseReviewJson(text) {
              try {
                return JSON.parse(text);
              } catch {
                const match = text.match(/\{[\s\S]*\}/);
                if (!match) throw new Error('未找到 JSON 对象');
                return JSON.parse(match[0]);
              }
            }

            let data;
            try {
              data = parseReviewJson(answer);
            } catch (error) {
              core.setFailed(`无法解析 Claude 回复为 JSON: ${error.message}\n${answer.slice(0, 500)}`);
              return;
            }

            const required = [
              'status',
              'risk_level',
              'auto_deploy',
              'reason',
              'issues',
              'suggestions',
            ];
            for (const key of required) {
              if (!(key in data)) {
                core.setFailed(`Claude 回复缺少字段: ${key}`);
                return;
              }
            }

            const body = [
              '<!-- claude-code-review -->',
              '## 审查结论',
              `- 状态: ${data.status}`,
              `- 风险等级: ${data.risk_level}`,
              `- 能否自动部署: ${data.auto_deploy}`,
              `- 理由: ${data.reason}`,
              '',
              '## 问题列表',
              String(data.issues).trim() || '无',
              '',
              '## 修改建议',
              String(data.suggestions).trim() || '无',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.info('PR 审查评论已发布。');
