# PR 打开或更新时，Claude Headless 自动审查并给出结论
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  ANTHROPIC_BASE_URL: "https://www.hotaitool.net"
  ANTHROPIC_AUTH_TOKEN: ${{ secrets.HOTAI_API_KEY }}
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check HOTAI_API_KEY
        env:
          HOTAI_API_KEY: ${{ secrets.HOTAI_API_KEY }}
        run: |
          if [ -z "$HOTAI_API_KEY" ]; then
            echo "::error::未配置 HOTAI_API_KEY。请到仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Build review prompt
        id: build
        run: |
          {
            echo 'text<<EOF'
            echo "REPO: ${{ github.repository }}"
            echo "PR NUMBER: ${{ github.event.pull_request.number }}"
            echo ""
            echo "你是 PR 代码审查 Bot。Vue 3 + Vite 静态站，GitHub Pages base 为 /vue-test/。"
            echo "不要调用任何工具，不要读文件，不要运行命令，只输出 PR 评论 markdown 正文。"
            echo ""
            echo "审查标准："
            echo "- low / APPROVE / 能否自动部署 yes：仅改 src/ 下 UI、文案、样式，无密钥"
            echo "- high / BLOCK / no：改 workflow 且明显错误、泄露密钥、vite base 非 /vue-test/、会导致 build 失败"
            echo "- medium / 需确认 / no：package.json 大版本依赖、改 deploy/Pages 配置、删重要文件"
            echo "- 能否自动部署 yes 仅当：APPROVE + low + 改动仅在 src/"
            echo ""
            echo "--- PR DIFF ---"
            cat pr.diff
            echo "--- END DIFF ---"
            echo ""
            echo "输出格式（严格遵守，每行只填一个实际结论，禁止写「或」）："
            echo "## 审查结论"
            echo "- 状态: <APPROVE 或 BLOCK，按 diff 实际判断>"
            echo "- 风险等级: <low 或 medium 或 high>"
            echo "- 能否自动部署: <yes 或 no>"
            echo "- 理由: <一句话>"
            echo ""
            echo "## 问题列表"
            echo "（无则写「无」）"
            echo ""
            echo "## 修改建议"
            echo "（无则写「无」）"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # prompt 参数 = Headless，单次文本输出，不占 tool turns
      - name: Claude PR Review (headless)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.HOTAI_API_KEY }}
          prompt: ${{ steps.build.outputs.text }}
          claude_args: |
            --max-turns 3
            --model claude-sonnet-4-6

      - name: Post PR comment
        uses: actions/github-script@v8
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        with:
          script: |
            const fs = require('fs');

            function extractFromExecutionFile(filePath) {
              if (!filePath || !fs.existsSync(filePath)) return '';

              const raw = fs.readFileSync(filePath, 'utf8');
              let resultText = '';
              let lastAssistantText = '';

              for (const line of raw.split('\n')) {
                if (!line.trim()) continue;
                try {
                  const obj = JSON.parse(line);

                  // headless 最终输出在 type=result 行，必须优先使用
                  if (
                    obj.type === 'result' &&
                    typeof obj.result === 'string' &&
                    obj.result.includes('审查结论')
                  ) {
                    resultText = obj.result.trim();
                  }

                  const content = obj.message?.content;
                  if (Array.isArray(content)) {
                    const text = content
                      .filter((part) => part.type === 'text' && part.text)
                      .map((part) => part.text)
                      .join('\n');
                    if (text.includes('审查结论')) lastAssistantText = text.trim();
                  }
                } catch {
                  // ignore non-JSON lines
                }
              }

              if (resultText) return resultText;
              if (lastAssistantText) return lastAssistantText;

              return '';
            }

            function normalizeBody(text) {
              const fenced = text.match(/```(?:markdown|md)?\s*([\s\S]*?)```/i);
              if (fenced) text = fenced[1].trim();

              // 兼容缺少 ## 前缀的情况
              if (!text.includes('## 审查结论')) {
                text = text.replace(/(^|\n)审查结论/m, '$1## 审查结论');
              }

              const start = text.indexOf('## 审查结论');
              if (start >= 0) text = text.slice(start);

              // 截断误混入的 JSONL / 日志尾巴
              const cutAt = text.search(/\n\s*[\[{]|\\n",|\n"type"\s*:/);
              if (cutAt > 0) text = text.slice(0, cutAt);

              return text.trim();
            }

            const prNumber = context.payload.pull_request.number;
            const execFile = process.env.EXEC_FILE;
            let body = extractFromExecutionFile(execFile);

            if (!body.includes('## 审查结论')) {
              core.error(`execution_file: ${execFile || '(empty)'}`);
              if (execFile && fs.existsSync(execFile)) {
                const preview = fs.readFileSync(execFile, 'utf8').slice(0, 800);
                core.error(`output preview:\n${preview}`);
              }
              core.setFailed('未能从 Claude 输出中解析审查评论，请查看 Claude PR Review 步骤日志。');
              return;
            }

            body = normalizeBody(body);

            // 明确标识为 Claude 自动审查（作者仍是 github-actions[bot]）
            body = `<!-- claude-code-review -->\n${body}`;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info('PR 审查评论已发布。');
            } catch (error) {
              core.warning(`GitHub API 发评论失败，尝试 gh pr comment: ${error.message}`);
              const { execSync } = require('child_process');
              const tmpFile = `${process.env.RUNNER_TEMP}/review-comment.md`;
              fs.writeFileSync(tmpFile, body);
              execSync(`gh pr comment ${prNumber} --body-file "${tmpFile}"`, {
                env: { ...process.env, GH_TOKEN: process.env.GITHUB_TOKEN },
                stdio: 'inherit',
              });
              core.info('PR 审查评论已通过 gh 发布。');
            }
